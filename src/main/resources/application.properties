spring.application.name=poke-collection

# PostgreSQL - usa variáveis de ambiente em produção ou valores locais
spring.datasource.url=jdbc:postgresql://${PGHOST:localhost}:${PGPORT:5432}/${PGDATABASE:postgres}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: cria/atualiza a estrutura automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Opcional: evita que o Hibernate logue demais em produção
spring.jpa.open-in-view=false

# Porta da aplicação (Railway usa variável PORT)
server.port=${PORT:8080}
