spring.application.name=poke-collection

# PostgreSQL - usa variáveis de ambiente em produção ou valores locais
spring.datasource.url=jdbc:${DATABASE_URL:postgresql://localhost:5432/postgres}
spring.datasource.username=${PGUSER:${DATABASE_USER:postgres}}
spring.datasource.password=${PGPASSWORD:${DATABASE_PASSWORD:postgres}}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate: cria/atualiza a estrutura automaticamente
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# Opcional: evita que o Hibernate logue demais em produção
spring.jpa.open-in-view=false

# Porta da aplicação (Railway usa variável PORT)
server.port=${PORT:8080}
